services:
  redis:
    image: redis:alpine
    container_name: vidmod_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: vidmod_rabbit
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  redis-data:
